services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  cloudnativeapp:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-cloudnativeapp}
    restart: unless-stopped
    depends_on:
      - rabbitmq
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ISSUER_URI: ${JWT_ISSUER_URI}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
      SERVER_PORT: ${SERVER_PORT:-8080}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      RESUMENES_PATH: ${RESUMENES_PATH:-/app/archivos/resumenes}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    volumes:
      - /home/ec2-user/wallets/Wallet_cloudnativeapp:/app/wallet:ro
      - /mnt/efs/resumenes:${RESUMENES_PATH:-/app/archivos/resumenes}
