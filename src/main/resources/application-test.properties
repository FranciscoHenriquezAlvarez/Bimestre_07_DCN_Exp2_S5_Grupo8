spring.datasource.url=jdbc:h2:mem:cloudnativeappdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

server.port=0

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost/issuer
spring.security.oauth2.resourceserver.jwt.audiences=test-audience
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost/jwks
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.dynamic=false

aws.region=us-east-1
aws.s3.bucket-name=
aws.access-key=
aws.secret-key=
aws.session-token=

app.archivos.resumenes-path=target/test-resumenes
app.rabbitmq.queue=resumen-inscripcion-queue
app.rabbitmq.exchange=resumen-inscripcion-exchange
app.rabbitmq.routing-key=resumen.inscripcion
