name: Deploy Cloud Native App

on:
  push:
    branches:
      - main

env:
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp:latest
  IMAGE_NAME_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/cloudnativeapp:${{ github.sha }}
  IMAGE_TAG: latest
  CONTAINER_NAME: cloudnativeapp
  DEPLOY_PATH: /home/ec2-user/cloudnativeapp

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permisos al wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas
        run: ./mvnw clean test

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir imagen Docker
        run: docker build -t $IMAGE_NAME -t $IMAGE_NAME_SHA .

      - name: Publicar imagenes en Docker Hub
        run: |
          docker push $IMAGE_NAME
          docker push $IMAGE_NAME_SHA

      - name: Desplegar en EC2 por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.USER_SERVER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"

            mkdir -p "$DEPLOY_PATH"

            if ! mountpoint -q /mnt/efs; then
              echo "ERROR: EFS no esta montado en /mnt/efs"
              exit 1
            fi

            sudo mkdir -p /mnt/efs/resumenes
            sudo chown -R ec2-user:ec2-user /mnt/efs/resumenes

            cd "$DEPLOY_PATH"

            cat > docker-compose.ec2.yml <<'EOF'
            services:
              cloudnativeapp:
                image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
                container_name: ${CONTAINER_NAME:-cloudnativeapp}
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  JWT_ISSUER_URI: ${JWT_ISSUER_URI}
                  JWT_AUDIENCE: ${JWT_AUDIENCE}
                  SERVER_PORT: ${SERVER_PORT:-8080}
                  AWS_REGION: ${AWS_REGION}
                  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
                  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
                  AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN}
                  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
                  RESUMENES_PATH: ${RESUMENES_PATH:-/app/archivos/resumenes}
                volumes:
                  - /home/ec2-user/wallets/Wallet_cloudnativeapp:/app/wallet:ro
                  - /mnt/efs/resumenes:${RESUMENES_PATH:-/app/archivos/resumenes}
            EOF

            cat > .env <<'EOF'
            IMAGE_NAME=${{ env.IMAGE_REPOSITORY }}
            IMAGE_TAG=${{ env.IMAGE_TAG }}
            CONTAINER_NAME=${{ env.CONTAINER_NAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_ISSUER_URI=${{ secrets.JWT_ISSUER_URI }}
            JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }}
            RESUMENES_PATH=/app/archivos/resumenes
            EOF

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose -f docker-compose.ec2.yml pull
            docker compose -f docker-compose.ec2.yml up -d --remove-orphans
